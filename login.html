<!DOCTYPE html>
<html lang="pt-br">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Login - Morpheus Company</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

</head>

<body class="login-body">

  <section class="login-section">

    <!-- LOGO -->

    <div class="login-logo">

      <img
        src="img/Morpheus_LOGOS-removebg-preview.png"
        alt="Logo Morpheus Company"
      >

    </div>

    <!-- CARD -->

    <div class="login-card">

      <h1>Entrar</h1>

      <p>
        Acesse sua conta da Morpheus Company
      </p>

  <!-- INPUTS -->

<form class="login-form">

  <div class="input-group">

    <input
      type="text"
      placeholder="Usuário ou Email"
      required
    >

  </div>

  <div class="input-group">

    <input
      type="password"
      placeholder="Senha"
      required
    >

  </div>

  <!-- NOTIFICAÇÕES -->

  <div class="notification-option">

    <label class="switch">

      <input type="checkbox">

      <span class="slider"></span>

    </label>

    <p>
      Aceita receber notificações das novidades?
    </p>

  </div>

  <!-- BOTÃO -->

  <button
    type="submit"
    class="login-btn"
  >

    Entrar

  </button>

</form>

        <!-- BOTAO -->

        <button
          type="submit"
          class="login-btn"
        >

          Entrar

        </button>

      </form>

      <!-- DIVISOR -->

      <div class="divider">

        <span>ou continue com</span>

      </div>

      <!-- LOGIN SOCIAL -->

      <div class="social-login">

        <button class="google-btn">

          <i class="fa-brands fa-google"></i>

          Google

        </button>

        <button class="facebook-btn">

          <i class="fa-brands fa-facebook-f"></i>

          Facebook

        </button>

      </div>

      <!-- CADASTRO -->

      <div class="register-link">

        <p>

          Não possui conta?

          <a href="#">
            Criar Conta
          </a>

        </p>

      </div>

    </div>

    <!-- VOLTAR -->

    <a
      href="index.html"
      class="back-store"
    >

      Voltar para Loja

    </a>

  </section>

</body>
</html>
