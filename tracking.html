<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Acompanhar Pedido | Morpheus Company</title>

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="tracking.css"
  >

  <!-- FONT AWESOME -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

</head>

<body class="tracking-body">

  <!-- =========================
       TRACKING CARD
  ========================== -->

  <section class="tracking-card">

    <h1>Acompanhar Pedido</h1>

    <p>
      Digite o código do seu pedido abaixo para acompanhar o status da entrega.
    </p>

    <!-- INPUT -->

    <div class="tracking-input">

      <input
        type="text"
        placeholder="Ex: #MORPHEUS2048"
      >

    </div>

    <!-- BOTÃO -->

    <button class="tracking-btn">

      Buscar Pedido

    </button>

    <!-- STATUS -->

    <div class="tracking-status">

      <!-- STATUS 1 -->

      <div class="status-item active">

        <div class="status-icon">

          <i class="fa-solid fa-box"></i>

        </div>

        <span>Pedido Confirmado</span>

      </div>

      <!-- LINHA -->

      <div class="status-line"></div>

      <!-- STATUS 2 -->

      <div class="status-item active">

        <div class="status-icon">

          <i class="fa-solid fa-truck"></i>

        </div>

        <span>Em Transporte</span>

      </div>

      <!-- LINHA -->

      <div class="status-line"></div>

      <!-- STATUS 3 -->

      <div class="status-item">

        <div class="status-icon">

          <i class="fa-solid fa-house"></i>

        </div>

        <span>Entregue</span>

      </div>

    </div>

    <!-- VOLTAR -->

    <a
      href="index.html"
      class="back-store"
    >

      <i class="fa-solid fa-arrow-left"></i>
      Voltar para Loja

    </a>

  </section>

</body>

</html>
