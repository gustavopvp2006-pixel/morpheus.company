<!DOCTYPE html>
<html lang="pt-br">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Acompanhar Pedido</title>

  <link
    rel="stylesheet"
    href="tracking.css"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

</head>

<body class="tracking-body">

<section class="tracking-container">

  <h1>Acompanhar Pedido</h1>

  <p>Digite o código do seu pedido abaixo</p>

  <input
    type="text"
    placeholder="Ex: #MORPHEUS2048"
  >

  <button>Buscar Pedido</button>

  <div class="tracking-status">

    <div class="status-item active">
      <div class="status-icon">
        <i class="fa-solid fa-box"></i>
      </div>

      <span>Pedido Confirmado</span>
    </div>

    <div class="status-line"></div>

    <div class="status-item active">
      <div class="status-icon">
        <i class="fa-solid fa-truck"></i>
      </div>

      <span>Em Transporte</span>
    </div>

    <div class="status-line"></div>

    <div class="status-item">
      <div class="status-icon">
        <i class="fa-solid fa-house"></i>
      </div>

      <span>Entregue</span>
    </div>

  </div>

  <a
    href="index.html"
    class="back-store"
  >
    Voltar para Loja
  </a>

</section>
